name: PR Auto-Fix Bot

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master]

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── Auto-fix code issues ────────────────────────────────────
  auto-fix:
    runs-on: ubuntu-latest
    if: "!github.event.pull_request.head.repo.fork"
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run linter with auto-fix
        run: npm run lint -- --fix 2>/dev/null || true

      - name: Check for changes
        id: changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push fixes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "nasnet-bot[bot]"
          git config user.email "nasnet-bot@nastechai.com"
          git add -A
          git commit -m "🤖 auto-fix: lint + formatting"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

  # ── PR Review Bot (comment with issues) ─────────────────────
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build check
        run: npm run build 2>&1 | tail -20
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        continue-on-error: true

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha,
            });

            const buildCheck = checks.check_runs.find(c => c.name === 'Build check');
            const status = buildCheck?.conclusion === 'success' ? '✅' : '❌';

            const body = `## 🤖 NasNet Bot Review

            | Check | Status |
            |-------|--------|
            | Build | ${status} |
            | Lint | ✅ |

            ${buildCheck?.conclusion !== 'success' ? '⚠️ **Build failed.** Please check the logs above.' : '🎉 All checks passed!'}

            ---
            *This is an auto-generated comment by the NasNet CI bot.*`;

            // Only comment if no previous bot comment exists
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const hasBotComment = comments.some(c => c.body.includes('NasNet Bot Review'));
            if (!hasBotComment) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }

  # ── Security scan ──────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Run npm audit
        run: npm audit --production --audit-level=high 2>&1 || true

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
        continue-on-error: true
